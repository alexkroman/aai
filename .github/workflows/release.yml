name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  DENO_VERSION: "2.x"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: aai-darwin-arm64
            runner: macos-latest
          - target: x86_64-apple-darwin
            artifact: aai-darwin-x64
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            artifact: aai-linux-x64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Compile binary
        run: |
          deno compile \
            --frozen \
            --allow-all \
            --unstable-worker-options \
            --include templates/ \
            --include server/ \
            --include ui/ \
            --include cli/claude.md \
            --include cli/deno.json \
            --include node_modules/.deno/esbuild-wasm@0.27.3/node_modules/esbuild-wasm/esbuild.wasm \
            --target ${{ matrix.target }} \
            --output dist/aai \
            cli/cli.ts

      - name: Create tarball
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz aai
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create version file
        run: jq -r .version deno.json > artifacts/VERSION

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt
          cat checksums.txt

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest
          body: Latest build from main
          make_latest: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/VERSION
