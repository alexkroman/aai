name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  DENO_VERSION: "2.x"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read CLI version
        id: read
        run: echo "version=$(jq -r .version cli/deno.json)" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: check
        run: |
          OLD=$(git show HEAD~1:cli/deno.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version cli/deno.json)
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [check-version]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: aai-darwin-arm64
            runner: macos-latest
          - target: x86_64-apple-darwin
            artifact: aai-darwin-x64
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            artifact: aai-linux-x64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Compile binary
        run: |
          deno compile \
            --allow-all \
            --unstable-worker-options \
            --include deno.json \
            --include templates/ \
            --include sdk/ \
            --include core/ \
            --include server/ \
            --include ui/ \
            --include cli/claude.md \
            --include cli/deno.json \
            --include node_modules/.deno/esbuild-wasm@0.27.3/node_modules/esbuild-wasm/esbuild.wasm \
            --target ${{ matrix.target }} \
            --output dist/aai \
            cli/cli.ts

      - name: Create tarball
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz aai
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create VERSION file
        run: echo "${{ needs.check-version.outputs.version }}" > artifacts/VERSION

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt
          cat checksums.txt

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.check-version.outputs.version }}
          make_latest: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/VERSION

      - name: Create latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create latest \
            --title "Latest" \
            --notes "Latest release (v${{ needs.check-version.outputs.version }})" \
            --target "${{ github.sha }}" \
            artifacts/*.tar.gz artifacts/checksums.txt artifacts/VERSION
