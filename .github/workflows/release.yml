name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  DENO_VERSION: "2.x"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
      tag: ${{ steps.get.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from source
        id: get
        run: |
          VERSION=$(jq -r '.version' deno.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

  build:
    needs: version
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: aai-darwin-arm64
            runner: macos-latest
          - target: x86_64-apple-darwin
            artifact: aai-darwin-x64
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            artifact: aai-linux-x64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Compile binary
        run: |
          deno compile \
            --allow-all \
            --unstable-worker-options \
            --include templates/ \
            --include skills/ \
            --include server/ \
            --include ui/ \
            --target ${{ matrix.target }} \
            --output dist/aai \
            cli/cli.ts

      - name: Create tarball
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz aai
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
