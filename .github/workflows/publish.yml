name: Publish to JSR

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Publish @aai/sdk
        run: deno publish --allow-dirty
        working-directory: sdk

      - name: Publish @aai/ui
        run: deno publish --allow-dirty
        working-directory: ui
