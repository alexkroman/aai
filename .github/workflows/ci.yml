name: CI

on:
  pull_request:

env:
  DENO_VERSION: "2.x"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run checks
        run: DENO_FROZEN_LOCKFILE=true deno task check
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}

      - name: Compile binary
        run: |
          npm_includes=""
          for pkg in preact @preact+signals @preact+signals-core goober lodash-es esbuild-wasm; do
            dir=$(ls -d node_modules/.deno/${pkg}@* 2>/dev/null | head -1)
            [ -n "$dir" ] && npm_includes="$npm_includes --include $dir"
          done
          deno compile \
            --allow-all \
            --unstable-worker-options \
            --include templates/ \
            --include sdk/ \
            --include core/ \
            --include ui/ \
            --include cli/claude.md \
            --include cli/deno.json \
            --include _bundler_config.json \
            $npm_includes \
            --output dist/aai \
            cli/cli.ts

      - name: Verify binary
        run: ./dist/aai --version
