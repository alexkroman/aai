name: CI

on:
  push:
  pull_request:
    branches: [main]

env:
  DENO_VERSION: "2.x"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run checks
        run: deno task check
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          ASSEMBLYAI_TTS_API_KEY: ${{ secrets.ASSEMBLYAI_TTS_API_KEY }}
