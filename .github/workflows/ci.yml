name: CI

on:
  pull_request:

env:
  DENO_VERSION: "2.x"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run checks
        run: deno task check
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}

      - name: Compile binary
        run: |
          deno compile \
            --allow-all \
            --unstable-worker-options \
            --include templates/ \
            --include server/ \
            --include ui/ \
            --include cli/claude.md \
            --output dist/aai \
            cli/cli.ts

      - name: Verify binary
        run: ./dist/aai --version
